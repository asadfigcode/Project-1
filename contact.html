<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fbff;
      --muted: #b8c2d8;
      --aqua: #62f4d8;
      --rose: #ff6f91;
      --gold: #ffd166;
      --panel: rgba(12, 18, 32, 0.72);
      --line: rgba(255, 255, 255, 0.18);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 110px 0 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 14% 26%, rgba(98, 244, 216, 0.24), transparent 28%),
        radial-gradient(circle at 84% 20%, rgba(255, 111, 145, 0.22), transparent 26%),
        radial-gradient(circle at 48% 92%, rgba(255, 209, 102, 0.16), transparent 30%),
        linear-gradient(135deg, #080a12 0%, #12172b 50%, #090b13 100%);
      color: var(--ink);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      -webkit-mask-image: radial-gradient(circle, black 0%, transparent 78%);
      mask-image: radial-gradient(circle, black 0%, transparent 78%);
      animation: drift 18s linear infinite;
    }

    nav {
      position: fixed;
      top: 24px;
      left: 50%;
      z-index: 2;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(12, 18, 32, 0.58);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.26);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      transform: translateX(-50%);
    }

    a, button {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      text-decoration: none;
      font: inherit;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    nav a {
      min-height: 38px;
      padding: 0 16px;
      font-size: 0.92rem;
      box-shadow: none;
    }

    nav a[aria-current="page"], button {
      color: #071016;
      border-color: transparent;
      background: linear-gradient(90deg, var(--aqua), var(--gold));
    }

    a:hover, button:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.14);
    }

    button:hover {
      background: linear-gradient(90deg, var(--gold), var(--rose));
    }

    main {
      width: min(92vw, 900px);
      position: relative;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 28px;
      padding: 42px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.42);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--gold);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 7vw, 5.3rem);
      line-height: 0.96;
      letter-spacing: 0;
      text-wrap: balance;
    }

    h1 span {
      color: transparent;
      background: linear-gradient(90deg, var(--aqua), var(--gold), var(--rose));
      -webkit-background-clip: text;
      background-clip: text;
    }

    p {
      color: var(--muted);
      font-size: 1.06rem;
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 15px 16px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 136px;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: rgba(98, 244, 216, 0.72);
      box-shadow: 0 0 0 4px rgba(98, 244, 216, 0.12);
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(42px, 42px, 0); }
    }

    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
        padding: 36px 22px;
        border-radius: 22px;
      }
    }

    @media (max-width: 560px) {
      body { padding-top: 92px; }
      nav {
        top: 16px;
        width: min(92vw, 360px);
        justify-content: center;
      }

      nav a {
        flex: 1;
        padding: 0 10px;
      }
    }
  </style>
</head>
<body>
  <nav aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" aria-current="page">Contact</a>
  </nav>
  <main>
    <section>
      <p class="eyebrow">Contact</p>
      <h1>Send a bright little <span>hello.</span></h1>
      <p>Use the form to sketch a note. It is ready for a future backend, and right now it keeps the experience polished and local.</p>
      <a href="index.html">Back Home</a>
    </section>
    <form>
      <label>Name
        <input type="text" name="name" placeholder="Your name">
      </label>
      <label>Email
        <input type="email" name="email" placeholder="you@example.com">
      </label>
      <label>Message
        <textarea name="message" placeholder="Write your message..."></textarea>
      </label>
      <button type="submit">Send Message</button>
    </form>
  </main>
</body>
</html>
