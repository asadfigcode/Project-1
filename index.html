<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a12;
      --ink: #f8fbff;
      --muted: #b8c2d8;
      --aqua: #62f4d8;
      --rose: #ff6f91;
      --gold: #ffd166;
      --panel: rgba(12, 18, 32, 0.72);
      --line: rgba(255, 255, 255, 0.18);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(98, 244, 216, 0.28), transparent 28%),
        radial-gradient(circle at 88% 24%, rgba(255, 111, 145, 0.24), transparent 26%),
        radial-gradient(circle at 50% 92%, rgba(255, 209, 102, 0.18), transparent 30%),
        linear-gradient(135deg, #080a12 0%, #12172b 50%, #090b13 100%);
      color: var(--ink);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      -webkit-mask-image: radial-gradient(circle, black 0%, transparent 78%);
      mask-image: radial-gradient(circle, black 0%, transparent 78%);
      animation: drift 18s linear infinite;
    }

    main {
      width: min(92vw, 780px);
      padding: 56px;
      position: relative;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.42);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .spark {
      width: 84px;
      height: 84px;
      margin: 0 auto 26px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background:
        conic-gradient(from 180deg, var(--aqua), var(--gold), var(--rose), var(--aqua));
      box-shadow: 0 0 48px rgba(98, 244, 216, 0.3);
      animation: pulse 3.4s ease-in-out infinite;
    }

    .spark::after {
      content: "Hello";
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      border-radius: inherit;
      background: #0d1424;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.4rem, 10vw, 7.5rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-wrap: balance;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--aqua), var(--gold), var(--rose));
      -webkit-background-clip: text;
      background-clip: text;
    }

    p {
      max-width: 560px;
      margin: 26px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.22rem);
      line-height: 1.7;
    }

    .actions {
      margin-top: 34px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    a {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      text-decoration: none;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    a.primary {
      color: #071016;
      border-color: transparent;
      background: linear-gradient(90deg, var(--aqua), var(--gold));
    }

    a:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.14);
    }

    a.primary:hover {
      background: linear-gradient(90deg, var(--gold), var(--rose));
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(42px, 42px, 0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    @media (max-width: 560px) {
      main {
        padding: 36px 22px;
        border-radius: 22px;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="spark" aria-hidden="true"></div>
    <h1>Hello <span>World</span></h1>
    <p>A tiny page with a little sparkle, ready to open in your browser and greet the universe with style.</p>
    <div class="actions">
      <a class="primary" href="#">Shine On</a>
      <a href="#">Explore</a>
    </div>
  </main>
</body>
</html>
